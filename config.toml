# Example config.toml for eink-weather
refresh_secs = 600
theme = "light"
forecast_source = "live"
preview_svg_path = "./tmp/preview.svg"
preview_png_path = "./tmp/preview.png"
color_test_mode = false

[weather]
lat = 44.655215
lon = -63.590768
tz = "America/Halifax"
hours = 12

[calendar]
ics_url = "https://calendar.google.com/calendar/ical/james.graham%40redspace.com/private-92bbd96ec28fa5c304082bf0ff0a49fd/basic.ics"
days_ahead = 7
max_events = 50

[mock]
preset = "fog"
night = false
hours = 12
